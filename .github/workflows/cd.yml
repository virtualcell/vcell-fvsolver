name: CD

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master
  release:
    types:
      - published


env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        if: github.event_name == 'release' && github.event.action == 'published'
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Only Build Docker image
        uses: docker/build-push-action@v5
        if: github.event_name != 'release' || github.event.action != 'published'
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  native-build:
    name:
      native-build-${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-15-intel, windows-latest, ubuntu-latest, ubuntu-24.04-arm, macos-15]


    runs-on: ${{ matrix.platform }}

    steps:
      - name: checkout vcell-solvers repo
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install MacOS dependencies
        if: matrix.platform == 'macos-15' || matrix.platform == 'macos-15-intel'
        shell: bash
        run: |
          brew install boost
          brew install hdf5
          brew install libzip
          brew install ninja
          brew install libaec
          brew uninstall llvm@18
          brew install flang

          clang --version
          flang --version
          cmake --version
          brew info boost
          brew info hdf5

      - name: Install Intel MacOS specific dependencies
        if: matrix.platform == 'macos-15-intel'
        run: python3 -m pip install h5py numpy --break-system-packages

      - name: Install ARM MacOS dependencies Part 2
        if: matrix.platform == 'macos-15'
        run: /opt/homebrew/bin/python3 -m pip install numpy h5py --break-system-packages

      - name: Build Macos
        if: matrix.platform == 'macos-15' || matrix.platform == 'macos-15-intel'
        run: |
          platform=macos
          echo "working dir is $PWD"

          mkdir build
          cd build
          
          # General Build
          cmake \
          -G Ninja \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_CXX_COMPILER=clang++ \
          -DOPTION_TARGET_PYTHON_BINDING=OFF \
          -DOPTION_MINGW=OFF \
          -DOPTION_TARGET_MESSAGING=OFF \
          -DOPTION_TARGET_SMOLDYN_SOLVER=ON \
          -DOPTION_TARGET_FV_SOLVER=ON \
          -DOPTION_TARGET_DOCS=ON \
          -DOPTION_TARGET_TESTS=ON \
          -B . -S ..

          ninja

      - name: Test Macos
        if: matrix.platform == 'macos-15-intel' || matrix.platform == 'macos-15'
        run: |
          platform=macos
          echo "working dir is $PWD"

          cd build

          ctest -VV
          
          echo "------ running FiniteVolume_x64 ------"
          ./bin/FiniteVolume_x64 || true
          echo
          echo "------ running NFsim_x64 ------"
          ./bin/NFsim_x64 || true
          echo "------ running SundialsSolverStandalone_x64 ------"
          ./bin/SundialsSolverStandalone_x64 || true
          echo "------ running VCellStoch_x64 ------"
          ./bin/VCellStoch_x64 || true
          echo "------ running smoldyn_x64 ------"
          ./bin/smoldyn_x64 || true

#      - name: Setup tmate session
#        uses: mxschmitt/action-tmate@v3
#        with:
#          limit-access-to-actor: false


      - name: Install Windows Dependencies #Part 1
        if: matrix.platform == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >
            python3
            python-pip
            zip
            git
            mingw-w64-clang-x86_64-python-h5py
            mingw-w64-clang-x86_64-curl
            mingw-w64-clang-x86_64-toolchain
            mingw-w64-clang-x86_64-flang
            mingw-w64-clang-x86_64-cmake
            mingw-w64-clang-x86_64-boost
            mingw-w64-clang-x86_64-hdf5
            mingw-w64-clang-x86_64-libzip
            mingw-w64-clang-x86_64-zlib
            mingw-w64-clang-x86_64-libaec

#      - name: Install Windows Dependencies Part 2
#        if: matrix.platform == 'windows-latest'
#        shell: msys2 {0}
#        run: |
#          pip install h5py --break-system-packages

#      - name: Setup tmate session
#        uses: mxschmitt/action-tmate@v3
#        with:
#          limit-access-to-actor: false

      - name: Build Windows
        if: matrix.platform == 'windows-latest'
        shell: msys2 {0}
        run: |
          platform=windows
          echo "working dir is $PWD"

          mkdir build
          cd build

          export PATH="/c/Program\ Files/LLVM/bin:$PATH"

          cmake \
          -G Ninja \
          -DCMAKE_C_COMPILER="clang.exe" \
          -DCMAKE_CXX_COMPILER="clang++.exe" \
          -DOPTION_TARGET_PYTHON_BINDING=OFF \
          -DOPTION_TARGET_MESSAGING=OFF \
          -DOPTION_TARGET_SMOLDYN_SOLVER=ON \
          -DOPTION_TARGET_FV_SOLVER=ON \
          -DOPTION_TARGET_DOCS=OFF \
          -DOPTION_TARGET_TESTS=ON \
          -B . -S ..

          ninja -j 1

      - name: Test Windows
        if: matrix.platform == 'windows-latest'
        shell: msys2 {0}
        run: |
          platform=windows
          echo "working dir is $PWD"

          cd build
          
          export PATH="/d/a/_temp/msys64/clang64/bin:$PATH"
          pacman -Sy --noconfirm diffutils

          ctest -VV

          echo "------ running FiniteVolume_x64 ------"
          ./bin/FiniteVolume_x64 || true
          echo

      - name: Install Linux Dependencies
        if: matrix.platform == 'ubuntu-latest' || matrix.platform == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip libboost-all-dev libhdf5-dev libzip-dev libbz2-dev ninja-build
          python3 -m pip install h5py numpy
          
          # LLVM Install (need version 22+ for flang)
          wget https://apt.llvm.org/llvm.sh
          python3 -c "
          content = open('llvm.sh').read()
          old = '    if test \$LLVM_VERSION -gt 14; then\n        PKG=\"\$PKG libclang-rt-\$LLVM_VERSION-dev libpolly-\$LLVM_VERSION-dev\"\n    fi\nfi'
          new = '    if test \$LLVM_VERSION -gt 14; then\n        PKG=\"\$PKG libclang-rt-\$LLVM_VERSION-dev libpolly-\$LLVM_VERSION-dev\"\n    fi\n    if test \$LLVM_VERSION -ge 16; then\n        PKG=\"\$PKG flang-\$LLVM_VERSION\"\n    fi\nfi'
          open('llvm.sh', 'w').write(content.replace(old, new, 1))"
          chmod +x llvm.sh
          sudo ./llvm.sh 22 all
          export PATH="/usr/lib/llvm-22/bin:$PATH"
          echo "/usr/lib/llvm-22/bin" >> $GITHUB_PATH
          
          clang --version
          clang++ --version
          flang --version
          cmake --version
          dpkg -s libboost-all-dev
          dpkg -s libhdf5-dev

      - name: Build Linux
        if: matrix.platform == 'ubuntu-latest' || matrix.platform == 'ubuntu-24.04-arm'
        run: |
          platform=linux
          echo "working dir is $PWD"

          mkdir build
          cd build

          cmake \
          -G Ninja \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_CXX_COMPILER=clang++ \
          -DCMAKE_Fortran_COMPILER=flang \
          -DOPTION_TARGET_PYTHON_BINDING=OFF \
          -DOPTION_TARGET_MESSAGING=OFF \
          -DOPTION_TARGET_SMOLDYN_SOLVER=ON \
          -DOPTION_TARGET_FV_SOLVER=ON \
          -DOPTION_TARGET_DOCS=ON \
          -DOPTION_TARGET_TESTS=ON \
          -B . -S ..

          ninja

      - name: Test Linux
        if: matrix.platform == 'ubuntu-latest' || matrix.platform == 'ubuntu-24.04-arm'
        run: |
          platform=linux
          echo "working dir is $PWD"

          cd build

          ctest -VV

          echo "------ running FiniteVolume_x64 ------"
          ./bin/FiniteVolume_x64 || true
          echo


      - name: fix Macos shared object paths
        if: matrix.platform == 'macos-15-intel' || matrix.platform == 'macos-15'
        shell: bash
        run: |
          mkdir build/upload
          cd build/bin
          ls *_x64   | awk '{print $1}' | xargs -I '{}' otool -L '{}' | grep ")" | grep -v "build" | grep -v "System" | awk '{print $1}' | xargs -I '{}' cp -vn '{}' . || true
          ls *.dylib | awk '{print $1}' | xargs -I '{}' otool -L '{}' | grep ")" | grep -v "build" | grep -v "System" | awk '{print $1}' | xargs -I '{}' cp -vn '{}' . || true
          ls *.dylib | awk '{print $1}' | xargs -I '{}' otool -L '{}' | grep ")" | grep -v "build" | grep -v "System" | awk '{print $1}' | xargs -I '{}' cp -vn '{}' . || true
          chmod u+w,+x *
          tar czvf ../upload/mac64_bad_paths.tgz .
          ../../.github/scripts/install_name_tool_macos.sh
          tar czvf ../upload/fvsolver_mac64.tgz --dereference .

      - name: handle shared object paths for Windows native build
        if: matrix.platform == 'windows-latest'
        shell: msys2 {0}
        run: |
          mkdir build/upload
          cd build/bin
          ls *.exe | awk '{print $1}' | xargs -I '{}' ldd '{}' | grep '=> /' | grep -v build | grep -iv windows | awk '{print $3}' | xargs -I '{}' cp -vn '{}' . || true
          ls *.dll | awk '{print $1}' | xargs -I '{}' ldd '{}' | grep '=> /' | grep -v build | grep -iv windows | awk '{print $3}' | xargs -I '{}' cp -vn '{}' . || true
          ls *.dll | awk '{print $1}' | xargs -I '{}' ldd '{}' | grep '=> /' | grep -v build | grep -iv windows | awk '{print $3}' | xargs -I '{}' cp -vn '{}' . || true
          chmod u+w,+x *
          zip ../upload/fvsolver_win64.zip ./*
          cd ../..
          # fi

      - name: handle shared object paths for Linux native build
        if: matrix.platform == 'ubuntu-latest'
        shell: bash
        run: |
          mkdir build/upload
          cd build/bin
          ls *_x64   | awk '{print $1}' | xargs -I '{}' ldd '{}' | grep "=> /" | grep -v "build" | awk '{print $3}' | xargs -I '{}' cp -vn '{}' . || true
          ls *.so    | awk '{print $1}' | xargs -I '{}' ldd '{}' | grep "=> /" | grep -v "build" | awk '{print $3}' | xargs -I '{}' cp -vn '{}' . || true
          ls *.so    | awk '{print $1}' | xargs -I '{}' ldd '{}' | grep "=> /" | grep -v "build" | awk '{print $3}' | xargs -I '{}' cp -vn '{}' . || true
          chmod u+w,+x *
          tar czvf ../upload/fvsolver_linux64.tgz --dereference .
          cd ../..

      - name: Upload Intel Macos binaries
        if: matrix.platform == 'macos-15-intel'
        uses: actions/upload-artifact@v4
        with:
          name: fvsolver_macos_x86_64.tgz
          path: build/upload/fvsolver_mac64.tgz

      - name: Upload ARM Macos binaries
        if: matrix.platform == 'macos-15'
        uses: actions/upload-artifact@v4
        with:
          name: fvsolver_macos_arm64.tgz
          path: build/upload/fvsolver_mac64.tgz

      - name: Upload Windows binaries
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: fvsolver_win64.zip
          path: build/upload/fvsolver_win64.zip

      - name: Upload Linux binaries (x86)
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: fvsolver_linux64.tgz
          path: build/upload/fvsolver_linux64.tgz

      - name: Upload Linux binaries (ARM)
        if: matrix.platform == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v4
        with:
          name: fvsolver_linux_arm64.tgz
          path: build/upload/fvsolver_linux64.tgz

      - name: Setup tmate session
        if: ${{ failure() }}
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true

