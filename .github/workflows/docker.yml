name: "Docker"
# build and publish manylinux_2_34_x86_64 with GraalVM, Maven and Poetry
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag for the Docker image"
        required: true
        default: "latest"


jobs:
  deployment:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: ubuntu-latest
            arch: "x86_64"
          - name: ubuntu-24.04-arm
            arch: "aarch64"
    runs-on: ${{ matrix.platform.name }}
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/Dockerfile_manylinux_2_34_${{ matrix.platform.arch }}
          push: true
          tags: ghcr.io/fv-solver/Dockerfile_manylinux_2_34_${{ matrix.platform.arch }}:${{ github.event.inputs.tag }}
